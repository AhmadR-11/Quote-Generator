name: Next.js CI/CD Pipeline

# This tells GitHub to run this pipeline every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Step 3: Install all dependencies
      - name: Install Dependencies
        run: npm install

      # Step 4: Run our Jest test
      - name: Run Tests
        run: npm run test

      # Step 5: Build the Docker Image
      # (This verifies the Dockerfile works, though we aren't pushing the image anywhere yet)
      - name: Build Docker Image
        run: docker build -t my-next-app .